experiment_name: unet_ce

seed: 1015
device: cuda

data:
  root: ./data
  image_size: 256
  batch_size: 8
  num_workers: 4
  val_ratio: 0.2

model:
  in_channels: 3
  num_classes: 3
  base_channels: 64

train:
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  loss_type: ce

save:
  run_dir: ./runs
  result_dir: ./results