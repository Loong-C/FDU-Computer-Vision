project_name: pet-recognition-finetune
experiment_name: resnet18_grid_ep30_blr5e-05_clr0p001_bs16
seed: 1015
device: cuda
data:
  root: ./data
  image_size: 224
  batch_size: 16
  num_workers: 4
  val_ratio: 0.2
  num_classes: 37
model:
  name: resnet18
  pretrained: true
  attention: none
train:
  epochs: 30
  optimizer: adamw
  backbone_lr: 5.0e-05
  classifier_lr: 0.001
  weight_decay: 0.0001
scheduler:
  name: cosine
  min_lr: 1.0e-06
save:
  checkpoint_dir: ./checkpoints
  result_dir: ./results
