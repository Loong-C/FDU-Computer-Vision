project_name: pet-recognition-finetune
experiment_name: resnet18_pretrained_baseline

seed: 1015
device: cuda

data:
  root: ./data
  image_size: 224
  batch_size: 32
  num_workers: 4
  val_ratio: 0.2
  num_classes: 37

model:
  name: resnet18
  pretrained: true
  attention: none

train:
  epochs: 20
  optimizer: adamw
  backbone_lr: 0.0001
  classifier_lr: 0.001
  weight_decay: 0.0001

scheduler:
  name: cosine
  min_lr: 0.000001

save:
  checkpoint_dir: ./checkpoints
  result_dir: ./results